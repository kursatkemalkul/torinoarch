<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="icon" type="image/png" sizes="192x192" href="/images/favicon-192.png">
    <link rel="apple-touch-icon" href="/images/favicon-192.png">
    <title>Page Not Found | Torinoarch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-C6CXB8MYE5"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-C6CXB8MYE5');
    </script>
    <meta name="robots" content="noindex, follow">
    <meta name="description" content="The page you are looking for could not be found.">
    <script>
      // Eski Wix URL'leri dogru sayfaya tasi (arama motorlarinda kalan bagelantilar icin)
      (function () {
        var p = window.location.pathname.toLowerCase();
        var map = [
          [/^\/portfolio-collections\/my-portfolio\/home\/?$/, '/projects.html'],
          [/^\/portfolio-collections\//, '/projects.html'],
          [/^\/portfolio\//, '/projects.html'],
          [/^\/tr\/portfolio/, '/tr/projects.html']
        ];
        for (var i = 0; i < map.length; i++) {
          if (map[i][0].test(p)) { window.location.replace(map[i][1]); return; }
        }
      })();
    </script>
</head>
<body>
    <header class="header is-scrolled">
        <div class="header__inner">
            <a href="/index.html" class="logo"><img src="/images/logo.png" alt="Torinoarch" width="799" height="200"></a>
        </div>
    </header>

    <main style="min-height:60vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:120px 24px 80px;">
        <div>
            <p class="eyebrow" style="margin-bottom:16px;">404</p>
            <h1 style="margin-bottom:16px;">Page Not Found</h1>
            <p style="margin-bottom:8px;">The page you are looking for doesn&rsquo;t exist or may have moved.</p>
            <p style="margin-bottom:40px;color:#888;">Aradığınız sayfa bulunamadı ya da taşınmış olabilir.</p>
            <p>
                <a href="/index.html" class="btn" style="margin-right:12px;">Back to Home</a>
                <a href="/projects.html" class="btn">View Projects</a>
            </p>
            <p style="margin-top:24px;font-size:0.9rem;"><a href="/tr/" style="color:inherit;">Türkçe ana sayfa &rarr;</a></p>
        </div>
    </main>
</body>
</html>
